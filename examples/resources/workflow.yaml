# Example: Falcon Fusion Workflow
# A simple notification workflow triggered by a high-severity detection.
# NOTE: No workflows existed in the source repo — this is a synthetic example
# showing the YAML template format the IaC engine expects.

type: workflow
resource_id: notify_on_critical_detection
name: Notify on Critical Detection
description: |
  Sends a notification when a critical-severity detection fires.
  Trigger: detection with severity >= 70.
  Action: Posts to a webhook endpoint.
enabled: true
trigger:
  event: Investigatable/NGSIEM
  type: Signal
  conditions:
    severity:
      gte: 70
actions:
  webhook_notify:
    id: generic_webhook
    name: Post to webhook
    properties:
      url: https://hooks.example.com/alerts
conditions: {}
tags:
  - notification
  - critical

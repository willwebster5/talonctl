name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Check linting
        run: ruff check src/ tests/ --exclude src/talonctl/_version.py
      - name: Check formatting
        run: ruff format --check src/ tests/ --exclude src/talonctl/_version.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Run tests
        run: pytest tests/ -v --tb=short

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Smoke test — CLI help
        run: talonctl --help
      - name: Smoke test — version
        run: talonctl --version
      - name: Smoke test — init and validate
        run: |
          talonctl init /tmp/smoke-test
          cd /tmp/smoke-test
          talonctl validate

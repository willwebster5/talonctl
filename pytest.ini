[pytest]
# Pytest configuration for CrowdStrike Detection Engineering IaC system

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for test categorization
markers =
    integration: Integration tests requiring live API (use --integration flag)
    live_api: Tests that make real API calls to CrowdStrike
    slow: Long-running tests (>5 seconds)
    unit: Fast unit tests with mocks (default)

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Coverage options (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=scripts --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
